<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - CJ SCHOOLS Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-white shadow-lg">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-3">
                    <div class="text-purple-600">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                        </svg>
                    </div>
                    <h1 class="text-lg font-bold text-gray-800">CJ SCHOOLS</h1>
                </div>
            </div>
            <nav class="p-4">
                <a href="dashboard.html" class="flex items-center gap-3 w-full p-3 rounded-lg mb-2 hover:bg-gray-100 text-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="students.html" class="flex items-center gap-3 w-full p-3 rounded-lg mb-2 hover:bg-gray-100 text-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <span>Students</span>
                </a>
                <a href="classes.html" class="flex items-center gap-3 w-full p-3 rounded-lg mb-2 hover:bg-gray-100 text-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    <span>Classes</span>
                </a>
                <a href="teachers.html" class="flex items-center gap-3 w-full p-3 rounded-lg mb-2 hover:bg-gray-100 text-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <span>Teachers</span>
                </a>
                <a href="attendance.html" class="flex items-center gap-3 w-full p-3 rounded-lg mb-2 nav-active">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span>Attendance</span>
                </a>
                <a href="index.html" onclick="logout(); return false;" class="flex items-center gap-3 w-full p-3 rounded-lg mb-2 hover:bg-gray-100 text-gray-700 mt-8">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    <span>Logout</span>
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto p-8">
            <h2 class="text-3xl font-bold text-gray-800 mb-8">Attendance</h2>
            
            <div class="bg-white rounded-xl shadow-md p-6 mb-6">
                <div class="flex gap-4 items-center mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Date</label>
                        <input
                            type="date"
                            id="attendanceDate"
                            class="p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        />
                    </div>
                    <div class="flex-1"></div>
                    <button
                        id="saveAttendanceBtn"
                        class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg transition-colors self-end"
                    >
                        Save Attendance
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-gray-200">
                                <th class="text-left py-3 px-4 font-semibold text-gray-700">Student Name</th>
                                <th class="text-left py-3 px-4 font-semibold text-gray-700">Student ID</th>
                                <th class="text-left py-3 px-4 font-semibold text-gray-700">Grade</th>
                                <th class="text-center py-3 px-4 font-semibold text-gray-700">Status</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTableBody">
                            <!-- Attendance rows will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="text-xl font-bold text-gray-800 mb-4">Attendance Summary</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="p-4 bg-green-50 rounded-lg">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                                <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600">Present</p>
                                <p class="text-2xl font-bold text-gray-800" id="presentCount">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 bg-red-50 rounded-lg">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                                <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600">Absent</p>
                                <p class="text-2xl font-bold text-gray-800" id="absentCount">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 bg-yellow-50 rounded-lg">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center">
                                <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600">Late</p>
                                <p class="text-2xl font-bold text-gray-800" id="lateCount">0</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        const students = SchoolApp.data.students();
        let attendance = {};

        // Set today's date
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('attendanceDate').value = today;

        function renderAttendanceTable() {
            const tbody = document.getElementById('attendanceTableBody');
            tbody.innerHTML = students.map(student => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="py-3 px-4">${student.name}</td>
                    <td class="py-3 px-4 text-gray-600">${student.studentId}</td>
                    <td class="py-3 px-4 text-gray-600">${student.grade}</td>
                    <td class="py-3 px-4">
                        <div class="flex justify-center gap-2">
                            <button
                                onclick="markAttendance(${student.id}, 'Present')"
                                class="px-4 py-1 rounded-full text-sm font-medium transition-colors ${
                                    attendance[student.id] === 'Present' 
                                        ? 'status-badge-present' 
                                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                }"
                            >
                                Present
                            </button>
                            <button
                                onclick="markAttendance(${student.id}, 'Absent')"
                                class="px-4 py-1 rounded-full text-sm font-medium transition-colors ${
                                    attendance[student.id] === 'Absent' 
                                        ? 'status-badge-absent' 
                                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                }"
                            >
                                Absent
                            </button>
                            <button
                                onclick="markAttendance(${student.id}, 'Late')"
                                class="px-4 py-1 rounded-full text-sm font-medium transition-colors ${
                                    attendance[student.id] === 'Late' 
                                        ? 'status-badge-late' 
                                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                }"
                            >
                                Late
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            updateSummary();
        }

        function markAttendance(studentId, status) {
            attendance[studentId] = status;
            renderAttendanceTable();
        }

        function updateSummary() {
            const present = Object.values(attendance).filter(s => s === 'Present').length;
            const absent = Object.values(attendance).filter(s => s === 'Absent').length;
            const late = Object.values(attendance).filter(s => s === 'Late').length;

            document.getElementById('presentCount').textContent = present;
            document.getElementById('absentCount').textContent = absent;
            document.getElementById('lateCount').textContent = late;
        }

        document.getElementById('saveAttendanceBtn').addEventListener('click', () => {
            const date = document.getElementById('attendanceDate').value;
            if (!date) {
                alert('Please select a date');
                return;
            }

            // Save attendance data
            SchoolApp.data.saveAttendance(date, attendance);

            alert('Attendance saved successfully!');
        });

        // Load attendance for selected date
        document.getElementById('attendanceDate').addEventListener('change', (e) => {
            const date = e.target.value;
            attendance = SchoolApp.data.getAttendance(date);
            renderAttendanceTable();
        });

        // Initial render
        renderAttendanceTable();
    </script>
</body>
</html>
